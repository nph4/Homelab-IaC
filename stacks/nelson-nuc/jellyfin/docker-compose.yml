version: "3.8"

services:
  jellyfin:
    image: docker.io/linuxserver/jellyfin:10.11.6
    container_name: Jellyfin
    restart: unless-stopped

    networks:
      - proxy

    # Keep UDP discovery on the LAN
    ports:
      - "1900:1900/udp"
      - "7359:7359/udp"
      # Optional: expose the web UI directly on LAN (not required for Traefik)
      # - "8096:8096/tcp"

    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "America/Los_Angeles"

    volumes:
      - /home/nelson/containers/Jellyfin/config:/config
      - /mnt/nas/media/video/Movies:/data/Movies
      - /mnt/nas/media/video/TV:/data/TV
      - /mnt/nas/media/Books:/data/Books

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.jellyfin.entrypoints=https"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.local.nelsonhickman.com`)"
      - "traefik.http.routers.jellyfin.tls=true"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

networks:
  proxy:
    external: true
