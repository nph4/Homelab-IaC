version: "3.8"

services:
  wallos:
    image: ghcr.io/ellite/wallos:v4.6.2
    container_name: wallos
    restart: unless-stopped

    networks:
      - proxy

    environment:
      TZ: "America/Los_Angeles"

    volumes:
      # Persistent app database
      - wallos-db:/var/www/html/db
      # Uploaded logos
      - wallos-logos:/var/www/html/images/uploads/logos

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      - "traefik.http.routers.wallos.rule=Host(`wallos.local.nelsonhickman.com`)"
      - "traefik.http.routers.wallos.entrypoints=https"
      - "traefik.http.routers.wallos.tls=true"
      - "traefik.http.routers.wallos.tls.certresolver=cloudflare"

      - "traefik.http.services.wallos.loadbalancer.server.port=80"

networks:
  proxy:
    external: true

volumes:
  wallos-db:
  wallos-logos:
