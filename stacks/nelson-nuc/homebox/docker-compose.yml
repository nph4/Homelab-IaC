version: "3.8"

services:
  homebox:
    image: ghcr.io/sysadminsmedia/homebox:v0.24.1
    container_name: homebox
    restart: always

    environment:
      - HBOX_LOG_LEVEL=info
      - HBOX_LOG_FORMAT=text
      - HBOX_WEB_MAX_FILE_UPLOAD=10
      - HBOX_OPTIONS_ALLOW_ANALYTICS=false

    volumes:
      - homebox-data:/data/

    networks:
      - proxy

    labels:
      - "traefik.enable=true"

      # Router
      - "traefik.http.routers.homebox.rule=Host(`homebox.local.nelsonhickman.com`)"
      - "traefik.http.routers.homebox.entrypoints=https"
      - "traefik.http.routers.homebox.tls=true"
      - "traefik.http.routers.homebox.tls.certresolver=cloudflare"

      # Service
      - "traefik.http.services.homebox.loadbalancer.server.port=7745"

volumes:
  homebox-data:
    driver: local

networks:
  proxy:
    external: true
