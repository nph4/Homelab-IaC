services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:0.6.26-ls372
    container_name: calibre-web
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DOCKER_MODS=linuxserver/mods:universal-calibre
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
    volumes:
      - /home/nelson/containers/calibre/config:/config
      - /mnt/nas/media/Books:/books
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.calibre.rule=Host(`calibre.local.nelsonhickman.com`)
      - traefik.http.routers.calibre.entrypoints=https
      - traefik.http.routers.calibre.tls=true
      - traefik.http.routers.calibre.tls.certresolver=cloudflare
      - traefik.http.services.calibre.loadbalancer.server.port=8083


networks:
  proxy:
    external: true
