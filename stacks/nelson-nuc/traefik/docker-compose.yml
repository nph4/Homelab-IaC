version: "3.8"

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    networks:
      - proxy

    ports:
      - "80:80"
      - "443:443"

    # Make env usage explicit for Portainer/local deploys
    env_file:
      - .env

    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/cf_api_token
      TRAEFIK_DASHBOARD_CREDENTIALS: "${TRAEFIK_DASHBOARD_CREDENTIALS}"

    secrets:
      - cf_api_token

    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/nelson/containers/traefik/data/traefik.yml:/traefik.yml:ro
      - /home/nelson/containers/traefik/data/acme.json:/acme.json
      - /home/nelson/containers/traefik/data/config.yml:/config.yml:ro

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.entrypoints=http"
      - "traefik.http.routers.traefik.rule=Host(`traefik-dashboard.local.nelsonhickman.com`)"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_CREDENTIALS}"
      - "traefik.http.middlewares.traefik-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.traefik.middlewares=traefik-https-redirect"

      - "traefik.http.routers.traefik-secure.entrypoints=https"
      - "traefik.http.routers.traefik-secure.rule=Host(`traefik-dashboard.local.nelsonhickman.com`)"
      - "traefik.http.routers.traefik-secure.middlewares=traefik-auth"
      - "traefik.http.routers.traefik-secure.tls=true"
      - "traefik.http.routers.traefik-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-secure.service=api@internal"

      # Redirect / to /dashboard/
      - "traefik.http.middlewares.traefik-root-redirect.redirectregex.regex=^https?://traefik-dashboard\\.local\\.nelsonhickman\\.com/?$"
      - "traefik.http.middlewares.traefik-root-redirect.redirectregex.replacement=https://traefik-dashboard.local.nelsonhickman.com/dashboard/"
      - "traefik.http.middlewares.traefik-root-redirect.redirectregex.permanent=true"

      # Router to catch only the root and apply redirect
      - "traefik.http.routers.traefik-root.entrypoints=https"
      - "traefik.http.routers.traefik-root.rule=Host(`traefik-dashboard.local.nelsonhickman.com`) && Path(`/`)"
      - "traefik.http.rout
